validation.time-interval=start time must be before end time.
validation.range=minimum value must be smaller than maximum value.
validation.minute-precision=time must use minute precision.
validation.max-duration-days=time range must be no longer than {days} days.

room.name.pattern=name can only contain letters, numbers, spaces, dots, underscores, and hyphens.
room.area.pattern=area can only contain letters, numbers, spaces, dots, underscores, and hyphens.
room.open-hours.time-interval=open time must be before close time.
room.capacity.range=minimum capacity must be less than or equal to maximum capacity.

user.username.pattern=username can only contain letters, numbers, dots, underscores, and hyphens.
user.password.pattern=password can only contain letters, numbers, and common special characters.

availability.date-range.time-interval=start date must be before or equal to end date.
